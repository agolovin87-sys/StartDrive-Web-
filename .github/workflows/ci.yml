name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  webapp-compile-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Compile Kotlin/JS (webApp)
        run: ./gradlew :webApp:compileKotlinJs --no-daemon
        working-directory: .
